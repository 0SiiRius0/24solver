<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>24 Solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a38;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #e8e8f0;
      --muted: #666680;
      --card: #1a1a26;
    }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
 
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(232,255,71,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 60%);
    }
 
    .wrapper {
      width: 100%;
      max-width: 560px;
    }
 
    /* Header */
    .header {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
 
    .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,255,71,0.1);
      border: 1px solid rgba(232,255,71,0.25);
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
 
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 10vw, 6.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }
 
    h1 span {
      color: var(--accent);
    }
 
    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }
 
    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }
 
    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }
 
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }
 
    input#nums {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.08em;
    }
 
    input#nums::placeholder {
      color: var(--muted);
    }
 
    input#nums:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
    }
 
    button {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
    }
 
    button:hover {
      background: #f0ff60;
      box-shadow: 0 0 20px rgba(232,255,71,0.3);
    }
 
    button:active {
      transform: scale(0.97);
    }
 
    button:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }
 
    /* Number chips preview */
    .chips {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      min-height: 2.4rem;
      align-items: center;
    }
 
    .chip {
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--accent2);
      animation: popIn 0.2s ease;
      transition: border-color 0.2s;
    }
 
    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }
 
    /* Output */
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
 
    .output-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      background: rgba(232,255,71,0.1);
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      border: 1px solid rgba(232,255,71,0.2);
    }
 
    #out {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--text);
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
 
    #out:empty::before {
      content: 'solutions will appear here…';
      color: var(--muted);
    }
 
    #out .solution-line {
      display: block;
      padding: 0.15rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
 
    #out .solution-line:last-child { border-bottom: none; }
 
    #out .op { color: var(--accent2); }
    #out .num { color: var(--accent); }
 
    /* Status bar */
    .status {
      margin-top: 1rem;
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      min-height: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
 
    .status.loading { color: var(--accent); }
    .status.error { color: #ff5a5a; }
    .status.success { color: #6bff9e; }
 
    .spinner {
      width: 10px;
      height: 10px;
      border: 2px solid rgba(232,255,71,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
 
    .status.loading .spinner { display: block; }
 
    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
 
    /* Footer */
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>24 <span>Solver</span></h1>
      <p class="subtitle">Enter four numbers, find a way to reach 24 using +&nbsp;−&nbsp;×&nbsp;÷</p>
    </div>
 
    <div class="card">
      <label class="input-label" for="nums">Your four numbers</label>
      <div class="input-row">
        <input id="nums" placeholder="8, 8, 3, 3" autocomplete="off" spellcheck="false">
        <button onclick="run()" id="solveBtn">Solve</button>
      </div>
 
      <div class="chips" id="chips"></div>
 
      <div class="divider"></div>
 
      <div class="output-header">
        <span class="output-label">Solutions</span>
        <span class="count-badge" id="countBadge" style="display:none"></span>
      </div>
 
      <pre id="out"></pre>
 
      <div class="status" id="status">
        <div class="spinner"></div>
        <span id="statusText">ready</span>
      </div>
    </div>
 
    <div class="footer">powered by pyodide · runs entirely in your browser</div>
  </div>
 
  <!-- Chip preview on input -->
  <script>
    const numsInput = document.getElementById('nums');
    const chipsEl   = document.getElementById('chips');
 
    numsInput.addEventListener('input', () => {
      const vals = numsInput.value.split(/[\s,]+/).filter(s => s.trim() !== '');
      chipsEl.innerHTML = '';
      vals.slice(0, 4).forEach(v => {
        if (!isNaN(v) && v !== '') {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = v;
          chipsEl.appendChild(chip);
        }
      });
    });
 
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('statusText').textContent = msg;
    }
  </script>
 
  <!-- Load Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
  <script src="script.js"></script>
 
  <!-- Wrap run() to add nice UI feedback -->
  <script>
    const _origRun = window.run;
    window.run = async function() {
      const btn = document.getElementById('solveBtn');
      const out = document.getElementById('out');
      const badge = document.getElementById('countBadge');
 
      btn.disabled = true;
      out.innerHTML = '';
      badge.style.display = 'none';
      setStatus('initialising pyodide…', 'loading');
 
      try {
        await _origRun();
 
        // Count solutions from output text
        const text = out.textContent.trim();
        if (text) {
          const lines = text.split('\n').filter(l => l.trim());
          // Colorize operators
          out.innerHTML = lines.map(line =>
            '<span class="solution-line">' +
            line.replace(/([+\-*/÷×])/g, '<span class="op">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>') +
            '</span>'
          ).join('');
 
          badge.textContent = lines.length + (lines.length === 1 ? ' solution' : ' solutions');
          badge.style.display = 'inline-block';
          setStatus('done', 'success');
        } else {
          setStatus('no solutions found', 'error');
        }
      } catch(e) {
        setStatus('error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
